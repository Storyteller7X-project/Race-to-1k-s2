name: Collect LoR ladder

# Stáhne CELÝ Master žebříček z AM + EMEA každých 15 min a uloží ho do data/live.json.
# Do data/history.json navíc dopisuje snímek top hráčů (pro replay) cca po 2 hodinách.
# Cron interval si klidně změň (např. "*/30 * * * *").
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ladder
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: |
          cat > "$RUNNER_TEMP/collect.mjs" <<'EOF'
          import { readFileSync, writeFileSync, existsSync, mkdirSync } from "node:fs";

          const KEY = process.env.RIOT_API_KEY;
          if (!KEY) { console.error("Missing RIOT_API_KEY secret."); process.exit(1); }

          // -------- settings (uprav dle potřeby) --------
          const REGIONS = { AM: "americas", EMEA: "europe" }; // které servery sbírat
          const FRAME_TOP_N = 30;          // kolik top hráčů ukládat do historie (pro replay)
          const FRAME_INTERVAL_MIN = 120;  // jak často přidávat snímek do historie (minuty)
          const MAX_FRAMES = 600;          // strop počtu snímků (nejstarší se odmazávají)

          const LIVE_PATH = "data/live.json";
          const HIST_PATH = "data/history.json";

          function readJson(p, fallback){
            try { if (existsSync(p)) { const t = readFileSync(p,"utf8").trim(); return t ? JSON.parse(t) : fallback; } }
            catch (e) { console.warn("read "+p+" failed:", e.message); }
            return fallback;
          }

          async function fetchRegion(code){
            const url = `https://${REGIONS[code]}.api.riotgames.com/lor/ranked/v1/leaderboards`;
            try {
              const res = await fetch(url, { headers: { "X-Riot-Token": KEY } });
              if (!res.ok) { console.error(`[${code}] HTTP ${res.status} ${res.statusText}`); return null; }
              const json = await res.json();
              const players = Array.isArray(json.players) ? json.players : [];
              console.log(`[${code}] ${players.length} Masters`);
              return players.map(p => ({ name: String(p.name || ""), region: code, lp: Number(p.lp) || 0 }))
                            .filter(p => p.name);
            } catch (e) { console.error(`[${code}] fetch error:`, e.message); return null; }
          }

          const codes = Object.keys(REGIONS);
          const results = {};
          for (const c of codes) results[c] = await fetchRegion(c);

          // If a region failed, keep its previous entries instead of wiping everyone.
          const prevLive = readJson(LIVE_PATH, { updated:null, regions:codes, players:[] });
          let merged = [], anyOk = false;
          for (const c of codes) {
            if (results[c]) { anyOk = true; merged = merged.concat(results[c]); }
            else {
              const prev = (prevLive.players || []).filter(p => p.region === c);
              console.log(`[${c}] region unavailable — reusing ${prev.length} previous entries`);
              merged = merged.concat(prev);
            }
          }
          if (!anyOk) { console.error("All region fetches failed — leaving data unchanged."); process.exit(0); }

          merged.sort((a,b) => (b.lp - a.lp) || a.name.localeCompare(b.name));

          const now = new Date().toISOString();
          if (!existsSync("data")) mkdirSync("data", { recursive: true });

          // live.json — full current ladder
          writeFileSync(LIVE_PATH, JSON.stringify({ updated: now, regions: codes, count: merged.length, players: merged }));
          console.log(`live.json: ${merged.length} players written`);

          // history.json — append a top-N snapshot on cadence
          const hist = readJson(HIST_PATH, { frameTopN: FRAME_TOP_N, frames: [] });
          if (!Array.isArray(hist.frames)) hist.frames = [];
          hist.frameTopN = FRAME_TOP_N;
          const lastT = hist.frames.length ? new Date(hist.frames[hist.frames.length-1].t).getTime() : 0;
          const dueMs = FRAME_INTERVAL_MIN * 60 * 1000;
          if (!hist.frames.length || (Date.now() - lastT) >= dueMs) {
            const top = merged.slice(0, FRAME_TOP_N).map(p => ({ n: p.name, r: p.region, lp: p.lp }));
            hist.frames.push({ t: now, p: top });
            if (hist.frames.length > MAX_FRAMES) hist.frames.splice(0, hist.frames.length - MAX_FRAMES);
            writeFileSync(HIST_PATH, JSON.stringify(hist));
            console.log(`history.json: appended snapshot (${hist.frames.length} frames total)`);
          } else {
            console.log(`history.json: next snapshot in ~${Math.round((dueMs - (Date.now()-lastT))/60000)} min`);
          }
          EOF
          node "$RUNNER_TEMP/collect.mjs"

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: update ladder data [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
