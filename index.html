<!DOCTYPE html>
<html lang="en">
<head>
<!--
  ============================================================================
  RACE TO 1K  ·  běží CELÉ na GitHubu (žádný server, žádný Railway)
  Sleduje CELÝ Master žebříček ze serverů AM + EMEA.
  ============================================================================

  SOUBORY:
    - index.html                     -> tenhle web (načítá si data z JSON souborů níže)
    - data/live.json                 -> celý aktuální žebříček (Action ho přepisuje každý běh)
    - data/history.json              -> snímky top hráčů pro replay (Action dopisuje ~po 2 h)
    - .github/workflows/collect.yml  -> GitHub Action, každých ~15 min stáhne žebříček z Riot API

  NASTAVENÍ NA NOVÉM ÚČTU:
    1) Nahraj do repa všechny čtyři soubory (i složky data/ a .github/workflows/).
    2) Repo -> Settings -> Secrets and variables -> Actions -> New repository secret
         Name:   RIOT_API_KEY
         Secret: tvůj RGAPI-... klíč
       (Klíč patří VÝHRADNĚ sem do Secrets. Nikdy ho nedávej do žádného souboru,
        co se commituje — repo i Pages jsou veřejné. Action ho čte automaticky.)
    3) Repo -> Settings -> Actions -> General -> Workflow permissions
         -> "Read and write permissions"  (jinak Action nemůže zapsat data)
    4) Repo -> Settings -> Pages -> Source: "Deploy from a branch" -> main / (root)
    5) Repo -> Actions -> "Collect LoR ladder" -> Run workflow = první data hned teď.

  Datové soubory (data/*.json) si Action píše SAMA — needituj je ručně.
  ============================================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race to 1K</title>

<!-- ==========================================================================
     KONFIGURACE — TOHLE EDITUJEŠ TY (nepovinné doladění vzhledu)
     - target:      cílové LP (finiš), default 1000
     - replayLanes: kolik hráčů ukázat v replay závodě (top X), default 15
     - highlights:  zvýrazni konkrétní lidi. Klíč = jméno z žebříčku malými písmeny.
                    effect: storyteller | glitch | gold | stream
                    twitch (jen se "stream"): kanál -> odkaz + LIVE odznak
                    Příklad:   "storyteller": { "effect": "storyteller" }
     Které servery se sbírají (AM + EMEA) se nastavuje v collect.yml (REGIONS).
     ========================================================================== -->
<script id="race-config" type="application/json">
{
  "title": "RACE TO 1K",
  "subtitle": "LND community event season 2",
  "target": 1000,
  "replayLanes": 15,
  "highlights": {
  }
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0a0612;
    --bg-2:#0f0a1c;
    --surface:#160e28;
    --surface-2:#1d1435;
    --line:#2c2148;
    --teal:#21e6c1;
    --purple:#b14aff;
    --gold:#ffcf4a;
    --rose:#ff3b6b;
    --text:#ece6ff;
    --muted:#8a7fb0;
    --track:#120c22;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{background:var(--bg);color:var(--text)}

  body{
    font-family:'Rajdhani',system-ui,sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
    padding:clamp(1rem,4vw,3rem) clamp(0.75rem,4vw,2rem) 4rem;
  }

  /* ambient arcane atmosphere */
  .aurora{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(50rem 40rem at 12% -10%, rgba(177,74,255,.18), transparent 60%),
      radial-gradient(45rem 40rem at 105% 8%, rgba(33,230,193,.14), transparent 55%),
      radial-gradient(40rem 40rem at 50% 120%, rgba(255,207,74,.07), transparent 60%);
    animation:drift 22s ease-in-out infinite alternate;
  }
  @keyframes drift{from{transform:translate3d(-1.5%,-1%,0) scale(1)}to{transform:translate3d(1.5%,1.5%,0) scale(1.06)}}

  .grid-lines{
    position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:48px 48px;
    -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 25%,transparent 75%);
            mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 25%,transparent 75%);
  }

  .wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto}

  /* ---------- header ---------- */
  header{margin-bottom:clamp(1.5rem,4vw,2.75rem)}

  .eyebrow{
    font-family:'Share Tech Mono',monospace;
    letter-spacing:.42em;text-transform:uppercase;
    font-size:.72rem;color:var(--teal);
    display:flex;align-items:center;gap:.7rem;margin-bottom:.6rem;
  }
  .eyebrow::before{content:"";width:26px;height:1px;background:linear-gradient(90deg,var(--teal),transparent)}

  h1{
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:clamp(2.3rem,8vw,4.6rem);line-height:.95;letter-spacing:.01em;
    background:linear-gradient(100deg,#fff 0%,var(--teal) 42%,var(--purple) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 60px rgba(177,74,255,.25);
  }

  .subtitle{
    margin-top:.7rem;color:var(--muted);
    font-size:clamp(.95rem,2.4vw,1.15rem);font-weight:600;letter-spacing:.02em;
    display:flex;flex-wrap:wrap;align-items:center;gap:.6rem .95rem;
  }
  .updated{
    font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--muted);
    display:inline-flex;align-items:center;gap:.5rem;
    padding:.25rem .6rem;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.02);
  }
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:blink 2s ease-in-out infinite}
  @keyframes blink{50%{opacity:.35}}

  /* ---------- track scale ---------- */
  .scale{
    display:flex;justify-content:space-between;
    font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);
    padding:0 0 .5rem;margin-left:clamp(0px,14vw,190px);
  }
  .scale .goal{color:var(--gold)}

  /* ---------- rows ---------- */
  .board{display:flex;flex-direction:column;gap:.7rem}

  .row{
    display:grid;
    grid-template-columns:clamp(150px,26vw,190px) 1fr;
    align-items:center;gap:clamp(.6rem,2vw,1.4rem);
    background:linear-gradient(180deg,var(--surface),var(--bg-2));
    border:1px solid var(--line);border-radius:14px;
    padding:clamp(.7rem,2vw,1.05rem) clamp(.8rem,2.5vw,1.3rem);
    position:relative;overflow:hidden;
    transition:border-color .25s,transform .25s;
  }
  .row:hover{transform:translateY(-2px)}
  .row.leader{border-color:rgba(33,230,193,.55);box-shadow:0 0 0 1px rgba(33,230,193,.25),0 12px 40px -18px rgba(33,230,193,.6)}
  .row.done{border-color:rgba(255,207,74,.6);box-shadow:0 0 0 1px rgba(255,207,74,.3),0 12px 44px -16px rgba(255,207,74,.55)}
  .row.absent{opacity:.6}

  /* identity block */
  .who{display:flex;align-items:center;gap:.7rem;min-width:0}
  .rank{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.05rem;
    width:2.2rem;height:2.2rem;flex:0 0 auto;display:grid;place-items:center;border-radius:9px;
    background:var(--track);border:1px solid var(--line);color:var(--muted);
  }
  .rank.p1{color:#0a0612;background:linear-gradient(150deg,#fff5cc,var(--gold));border-color:transparent;box-shadow:0 0 18px rgba(255,207,74,.55)}
  .rank.p2{color:#0a0612;background:linear-gradient(150deg,#eef2ff,#c6cede);border-color:transparent}
  .rank.p3{color:#0a0612;background:linear-gradient(150deg,#ffd9b0,#d9873f);border-color:transparent}

  .namewrap{min-width:0}
  .name{
    font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(.92rem,2.1vw,1.08rem);
    letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:inline-flex;align-items:center;gap:.45rem;
  }
  .region-tag{
    font-family:'Share Tech Mono',monospace;font-size:.66rem;letter-spacing:.12em;
    color:var(--muted);text-transform:uppercase;
  }

  /* name effects (highlights) — target shared .pname class */
  .fx-storyteller .pname{color:var(--teal);text-shadow:0 0 14px rgba(33,230,193,.55)}
  .fx-storyteller .pname .mark{color:var(--teal)}
  .mark{font-size:.85em}

  .fx-gold .pname{
    background:linear-gradient(100deg,#fff4cf,var(--gold),#b8862a,var(--gold));
    background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 4s linear infinite;
  }
  @keyframes shimmer{to{background-position:220% center}}

  .fx-glitch .pname{position:relative;color:var(--text)}
  .fx-glitch .pname .glitch{position:relative;display:inline-block}
  .fx-glitch .pname .glitch::before,
  .fx-glitch .pname .glitch::after{
    content:attr(data-text);position:absolute;left:0;top:0;width:100%;overflow:hidden;
    clip-path:inset(0 0 0 0);
  }
  .fx-glitch .pname .glitch::before{color:var(--rose);animation:glitchA 2.6s infinite steps(2,end)}
  .fx-glitch .pname .glitch::after{color:var(--teal);animation:glitchB 3.1s infinite steps(2,end)}
  @keyframes glitchA{0%,92%,100%{transform:translate(0);clip-path:inset(0 0 100% 0)}93%{transform:translate(-2px,-1px);clip-path:inset(10% 0 55% 0)}96%{transform:translate(2px,1px);clip-path:inset(60% 0 8% 0)}}
  @keyframes glitchB{0%,90%,100%{transform:translate(0);clip-path:inset(100% 0 0 0)}91%{transform:translate(2px,1px);clip-path:inset(20% 0 40% 0)}97%{transform:translate(-2px,0);clip-path:inset(50% 0 20% 0)}}

  /* stream badge */
  .live{
    font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.14em;
    color:#fff;background:var(--rose);padding:.12rem .4rem;border-radius:4px;
    text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;
    box-shadow:0 0 12px rgba(255,59,107,.5);
  }
  .live b{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.3s infinite}

  /* progress track */
  .prog{display:flex;flex-direction:column;gap:.42rem;min-width:0}
  .bar{
    position:relative;height:16px;border-radius:999px;background:var(--track);
    border:1px solid var(--line);overflow:hidden;
  }
  .fill{
    position:absolute;inset:0 auto 0 0;height:100%;border-radius:999px;width:0;
    background:linear-gradient(90deg,var(--teal),var(--purple));
    box-shadow:0 0 16px rgba(177,74,255,.5);
    transition:width 1s cubic-bezier(.2,.8,.2,1);
  }
  .leader .fill{background:linear-gradient(90deg,#5cffe4,var(--teal),var(--purple))}
  .done .fill{background:linear-gradient(90deg,var(--gold),#ffe9a8,var(--gold));box-shadow:0 0 20px rgba(255,207,74,.6)}
  .fill::after{
    content:"";position:absolute;right:0;top:0;bottom:0;width:34px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.75));opacity:.65;
  }

  .meta{
    display:flex;justify-content:space-between;align-items:baseline;gap:.75rem;
    font-family:'Share Tech Mono',monospace;font-size:.74rem;color:var(--muted);
  }
  .lp{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1rem,2.6vw,1.35rem);color:var(--text);letter-spacing:.02em}
  .lp small{font-size:.55em;color:var(--muted);font-weight:500;margin-left:.15rem}
  .delta.up{color:var(--teal)}
  .delta.down{color:var(--rose)}
  .delta.flat{color:var(--muted)}
  .remaining{color:var(--muted)}
  .remaining.goalhit{color:var(--gold);font-weight:700}
  .peak{color:var(--muted)}

  .absent .lp{color:var(--muted)}
  .note{color:var(--muted);font-style:italic}

  /* empty state */
  .empty{
    text-align:center;padding:4rem 1rem;border:1px dashed var(--line);border-radius:16px;
    color:var(--muted);background:rgba(255,255,255,.015);
  }
  .empty .big{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--text);font-size:1.15rem;margin-bottom:.5rem}

  footer{
    margin-top:2.5rem;display:flex;flex-wrap:wrap;gap:.6rem 1.4rem;align-items:center;
    font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);
  }
  .legend{display:inline-flex;align-items:center;gap:.45rem}
  .swatch{width:10px;height:10px;border-radius:3px}
  .sw-teal{background:var(--teal)} .sw-gold{background:var(--gold)} .sw-rose{background:var(--rose)}

  @media (max-width:560px){
    .row{grid-template-columns:1fr}
    .who{margin-bottom:.15rem}
    .scale{margin-left:0}
  }

  /* ---------- live list head (count + filter) ---------- */
  .board-head{
    display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;
    margin-bottom:.6rem;
  }
  .count{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--muted);letter-spacing:.04em}
  .count b{color:var(--teal);font-weight:400}
  .filter{
    font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--text);
    background:var(--surface);border:1px solid var(--line);border-radius:8px;
    padding:.45rem .7rem;flex:0 1 260px;min-width:180px;outline:none;transition:border-color .2s;
  }
  .filter:focus{border-color:var(--teal)}
  .filter::placeholder{color:var(--muted)}

  /* ---------- live list (scrollable — all players) ---------- */
  .board.scroll{
    max-height:min(70vh,760px);overflow-y:auto;padding-right:.35rem;
    display:flex;flex-direction:column;gap:.4rem;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  }
  .board.scroll::-webkit-scrollbar{width:9px}
  .board.scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  .lrow{
    display:grid;grid-template-columns:3rem clamp(120px,26vw,230px) 1fr auto;
    align-items:center;gap:.55rem .85rem;padding:.5rem clamp(.55rem,2vw,.95rem);
    background:linear-gradient(180deg,var(--surface),var(--bg-2));
    border:1px solid var(--line);border-radius:10px;
  }
  .lrow.done{border-color:rgba(255,207,74,.55);box-shadow:0 0 0 1px rgba(255,207,74,.22)}
  .lrank{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
  .lrow.top1 .lrank{color:var(--gold);font-weight:700}
  .lname{
    font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(.82rem,1.9vw,.98rem);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.4rem;
  }
  .lregion{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .lbar{position:relative;height:10px;border-radius:999px;background:var(--track);border:1px solid var(--line);overflow:hidden}
  .lfill{position:absolute;inset:0 auto 0 0;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--purple))}
  .lrow.done .lfill{background:linear-gradient(90deg,var(--gold),#ffe9a8,var(--gold))}
  .llp{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(.82rem,1.9vw,1rem);color:var(--text);min-width:5.5ch;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  .llp small{font-size:.55em;color:var(--muted);font-weight:500;margin-left:.1rem}
  .no-match{text-align:center;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:.8rem;padding:1.5rem 0}

  @media (max-width:560px){
    .lrow{grid-template-columns:2.3rem 1fr auto;gap:.4rem .55rem}
    .lrow .lbar{display:none}
    .lregion{display:none}
  }

  /* ---------- replay controls ---------- */
  .replay-bar{
    display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;
    margin-bottom:1rem;padding:.6rem .7rem;border:1px solid var(--line);border-radius:12px;
    background:rgba(255,255,255,.02);
  }
  .rp-btn{
    font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--text);
    background:var(--surface-2);border:1px solid var(--line);border-radius:8px;
    padding:.45rem .7rem;cursor:pointer;transition:border-color .2s,color .2s,filter .2s;white-space:nowrap;
  }
  .rp-btn:hover{border-color:var(--teal);color:var(--teal)}
  .rp-btn.primary{background:linear-gradient(100deg,var(--teal),var(--purple));color:#0a0612;font-weight:700;border:none}
  .rp-btn.primary:hover{filter:brightness(1.08);color:#0a0612}
  .rp-btn.ghost{background:transparent}
  .rp-btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4)}
  .rp-btn:disabled:hover{border-color:var(--line);color:var(--text)}
  .rp-track{position:relative;flex:1 1 180px;min-width:130px;height:8px;background:var(--track);border:1px solid var(--line);border-radius:999px;cursor:pointer}
  .rp-fill{position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:999px}
  .rp-handle{position:absolute;top:50%;left:0;width:14px;height:14px;margin-left:-7px;transform:translateY(-50%);border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(33,230,193,.85);pointer-events:none}
  .rp-time{font-family:'Share Tech Mono',monospace;font-size:.74rem;color:var(--muted);min-width:8.5ch;white-space:nowrap}
  .rp-speeds{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .rp-speed{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--muted);background:transparent;border:none;padding:.42rem .62rem;cursor:pointer;transition:color .2s,background .2s}
  .rp-speed:hover{color:var(--text)}
  .rp-speed.active{background:var(--teal);color:#0a0612;font-weight:700}

  /* ---------- replay stage ---------- */
  #replay-stage{position:relative;display:none}
  .rrow{
    position:absolute;left:0;right:0;top:0;height:56px;
    display:grid;grid-template-columns:2.2rem clamp(120px,22vw,190px) 1fr auto;
    align-items:center;gap:.55rem .85rem;padding:0 clamp(.6rem,2vw,1.05rem);
    background:linear-gradient(180deg,var(--surface),var(--bg-2));
    border:1px solid var(--line);border-radius:12px;will-change:transform;
    transition:transform .55s cubic-bezier(.2,.8,.2,1),opacity .35s,border-color .3s,box-shadow .3s;
  }
  .rrow.done{border-color:rgba(255,207,74,.6);box-shadow:0 0 0 1px rgba(255,207,74,.3),0 10px 34px -16px rgba(255,207,74,.5)}
  .rrank{
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:.95rem;
    width:2.2rem;height:2.2rem;display:grid;place-items:center;border-radius:9px;
    background:var(--track);border:1px solid var(--line);color:var(--muted);
  }
  .rrank.p1{color:#0a0612;background:linear-gradient(150deg,#fff5cc,var(--gold));border-color:transparent;box-shadow:0 0 16px rgba(255,207,74,.5)}
  .rrank.p2{color:#0a0612;background:linear-gradient(150deg,#eef2ff,#c6cede);border-color:transparent}
  .rrank.p3{color:#0a0612;background:linear-gradient(150deg,#ffd9b0,#d9873f);border-color:transparent}
  .rname{
    font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(.85rem,2vw,1rem);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.4rem;
  }
  .rregion{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .rbar{position:relative;height:14px;border-radius:999px;background:var(--track);border:1px solid var(--line);overflow:hidden}
  .rfill{position:absolute;inset:0 auto 0 0;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--purple));box-shadow:0 0 14px rgba(177,74,255,.5)}
  .rrow.done .rfill{background:linear-gradient(90deg,var(--gold),#ffe9a8,var(--gold));box-shadow:0 0 18px rgba(255,207,74,.55)}
  .rlp{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(.85rem,2vw,1.05rem);color:var(--text);min-width:6ch;text-align:right;white-space:nowrap}
  .rrow .live{margin-left:.1rem}

  @media (max-width:560px){
    .rrow{grid-template-columns:1.7rem 74px 1fr auto;height:56px;gap:.4rem .55rem;padding:0 .6rem}
    .rregion{display:none}
    .rname{font-size:.82rem}
    .rlp{min-width:5ch;font-size:.82rem}
  }

  @media (prefers-reduced-motion:reduce){
    .aurora,.live-dot,.live b,.fx-gold .pname{animation:none}
    .fx-glitch .pname .glitch::before,.fx-glitch .pname .glitch::after{display:none}
    .fill{transition:none}
    .rrow{transition:opacity .25s,border-color .3s,box-shadow .3s}
  }
</style>
</head>
<body>
<div class="aurora"></div>
<div class="grid-lines"></div>

<div class="wrap">
  <header>
    <div class="eyebrow" id="eyebrow">Legends of Runeterra Masters</div>
    <h1 id="title">RACE TO 1K</h1>
    <div class="subtitle">
      <span id="subtitle">LND community event season 2</span>
      <span class="updated" id="updated"><span class="live-dot"></span><span id="updated-text">waiting for sync</span></span>
    </div>
  </header>

  <div class="replay-bar" id="replay-bar">
    <button class="rp-btn primary" id="rp-play">&#9654; Replay season</button>
    <button class="rp-btn" id="rp-restart" title="Restart from the beginning" hidden>&#8635;</button>
    <div class="rp-track" id="rp-track" hidden><div class="rp-fill" id="rp-fill"></div><div class="rp-handle" id="rp-handle"></div></div>
    <span class="rp-time" id="rp-time" hidden></span>
    <div class="rp-speeds" id="rp-speeds" role="group" aria-label="Playback speed">
      <button type="button" class="rp-speed" data-mult="2">Slow</button>
      <button type="button" class="rp-speed active" data-mult="1">Normal</button>
      <button type="button" class="rp-speed" data-mult="0.4">Fast</button>
    </div>
    <button class="rp-btn ghost" id="rp-exit" title="Back to live standings" hidden>&#10005; Live</button>
  </div>

  <div class="board-head" id="board-head">
    <span class="count" id="count"></span>
    <input class="filter" id="filter" type="text" placeholder="Filter by name…" autocomplete="off" spellcheck="false">
  </div>
  <div class="scale"><span>0</span><span class="goal" id="goal-label">1000 LP</span></div>
  <div class="board scroll" id="board"></div>
  <div id="replay-stage" aria-hidden="true"></div>

  <footer>
    <span>Auto-updated every ~15 min via Riot API</span>
  </footer>
</div>

<script>
(function(){
  "use strict";

  function readJSON(id, fallback){
    try{ var el=document.getElementById(id); if(!el) return fallback; var t=el.textContent.trim(); return t?JSON.parse(t):fallback; }
    catch(e){ console.error("parse #"+id, e); return fallback; }
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function nfmt(n){ return Number(n).toLocaleString(); }
  function timeAgo(iso){
    if(!iso) return "waiting for sync";
    var then=new Date(iso).getTime(); if(isNaN(then)) return "waiting for sync";
    var s=Math.max(0,Math.floor((Date.now()-then)/1000));
    if(s<60) return "updated just now";
    var m=Math.floor(s/60); if(m<60) return "updated "+m+"m ago";
    var h=Math.floor(m/60); if(h<24) return "updated "+h+"h ago";
    return "updated "+Math.floor(h/24)+"d ago";
  }

  var cfg = readJSON("race-config", {});
  var target = Number(cfg.target) || 1000;
  var laneCount = Math.max(3, Number(cfg.replayLanes) || 15);
  var highlights = (cfg.highlights && typeof cfg.highlights === "object") ? cfg.highlights : {};

  function hlFor(name){ return highlights[String(name).toLowerCase()] || null; }
  function fxClass(hl){ return hl && hl.effect ? " fx-"+hl.effect : ""; }
  function nameInner(name, hl){
    if(hl && hl.effect === "glitch") return '<span class="glitch" data-text="'+esc(name)+'">'+esc(name)+'</span>';
    if(hl && hl.effect === "storyteller") return '<span class="mark">&#10022;</span>'+esc(name);
    return esc(name);
  }
  function liveBadge(hl){
    if(hl && hl.effect === "stream" && hl.twitch)
      return ' <a class="live" href="https://twitch.tv/'+esc(hl.twitch)+'" target="_blank" rel="noopener"><b></b>LIVE</a>';
    return "";
  }

  document.getElementById("title").textContent = cfg.title || "RACE TO 1K";
  document.getElementById("subtitle").textContent = cfg.subtitle || "";
  document.getElementById("goal-label").textContent = target + " LP";

  var board     = document.getElementById("board");
  var boardHead = document.getElementById("board-head");
  var countEl   = document.getElementById("count");
  var filterEl  = document.getElementById("filter");
  var updEl     = document.getElementById("updated-text");
  var scale     = document.querySelector(".scale");

  // ==================================================================
  // LIVE — all AM+EMEA Masters (scrollable + filter)
  // ==================================================================
  function renderLive(live){
    var players = (live && Array.isArray(live.players)) ? live.players.slice() : [];
    updEl.textContent = timeAgo(live && live.updated);

    if(!players.length){
      countEl.textContent = "";
      filterEl.style.display = "none";
      board.classList.remove("scroll");
      board.innerHTML = '<div class="empty"><div class="big">No data yet</div>Run the collector (Actions &#8594; Collect LoR ladder &#8594; Run workflow) to pull the ladder.</div>';
      return;
    }

    players.sort(function(a,b){ return (b.lp-a.lp) || String(a.name).localeCompare(String(b.name)); });
    var regions = (live.regions||[]).join(" + ") || "AM + EMEA";
    countEl.innerHTML = '<b>'+nfmt(players.length)+'</b> players in Masters &#183; '+esc(regions);
    filterEl.style.display = "";
    board.classList.add("scroll");

    board.innerHTML = players.map(function(p, i){
      var pos = i+1;
      var hl = hlFor(p.name);
      var done = p.lp >= target;
      var cls = ["lrow", fxClass(hl).trim()];
      if(done) cls.push("done");
      if(pos===1) cls.push("top1"); else if(pos===2) cls.push("top2"); else if(pos===3) cls.push("top3");
      var pct = Math.max(1.5, Math.min(100, (p.lp/target)*100));
      return ''+
        '<div class="'+cls.join(" ").replace(/\s+/g," ").trim()+'" data-name="'+esc(String(p.name).toLowerCase())+'">'+
          '<div class="lrank">'+pos+'</div>'+
          '<div class="lname pname">'+nameInner(p.name, hl)+liveBadge(hl)+'<span class="lregion">'+esc(p.region||"")+'</span></div>'+
          '<div class="lbar"><div class="lfill" style="width:'+pct.toFixed(1)+'%"></div></div>'+
          '<div class="llp">'+nfmt(p.lp)+'<small>LP</small></div>'+
        '</div>';
    }).join("") + '<div class="no-match" id="no-match" style="display:none">No player matches that name.</div>';

    var rows = board.querySelectorAll(".lrow");
    var noMatch = document.getElementById("no-match");
    filterEl.oninput = function(){
      var q = filterEl.value.trim().toLowerCase();
      var shown = 0;
      for(var i=0;i<rows.length;i++){
        var match = !q || rows[i].getAttribute("data-name").indexOf(q) !== -1;
        rows[i].style.display = match ? "" : "none";
        if(match) shown++;
      }
      noMatch.style.display = shown ? "none" : "";
    };
  }

  // ==================================================================
  // REPLAY — top-lane bar race, built from history frames (lazy-loaded)
  // ==================================================================
  function initReplay(){
    var playBtn=document.getElementById("rp-play"), restartBtn=document.getElementById("rp-restart"),
        exitBtn=document.getElementById("rp-exit"), track=document.getElementById("rp-track"),
        fillEl=document.getElementById("rp-fill"), handle=document.getElementById("rp-handle"),
        timeLbl=document.getElementById("rp-time"), speeds=document.getElementById("rp-speeds"),
        stage=document.getElementById("replay-stage");

    var ROW_H = 56;
    var ready=false, building=false;
    var contenders=[], rowEls={}, startT=0, endT=0, span=0;
    var BASE=30000, mult=1, progress=0, playing=false, rafId=null, lastTs=0;

    function setPlay(t){ playBtn.innerHTML = t; }

    function lpAt(pts, t){
      if(t < pts[0].t) return { present:false, lp:0 };
      if(t >= pts[pts.length-1].t) return { present:true, lp: pts[pts.length-1].lp };
      var i=0; while(i<pts.length-1 && t>=pts[i+1].t) i++;
      var a=pts[i], b=pts[i+1];
      var frac = (b.t===a.t) ? 0 : (t-a.t)/(b.t-a.t);
      return { present:true, lp: a.lp+(b.lp-a.lp)*frac };
    }

    function buildFromHistory(hist){
      var frames = (hist && Array.isArray(hist.frames) ? hist.frames : [])
        .map(function(f){ return { t:new Date(f.t).getTime(), p:Array.isArray(f.p)?f.p:[] }; })
        .filter(function(f){ return !isNaN(f.t); })
        .sort(function(a,b){ return a.t-b.t; });
      if(frames.length < 2) return false;

      var seen = {};
      frames.forEach(function(f){ f.p.slice(0, laneCount).forEach(function(x){ seen[x.n]=true; }); });

      var series={}, region={}, peak={};
      frames.forEach(function(f){
        f.p.forEach(function(x){
          if(!seen[x.n]) return;
          (series[x.n]=series[x.n]||[]).push({ t:f.t, lp:Number(x.lp)||0 });
          if(region[x.n]===undefined) region[x.n]=x.r;
          peak[x.n]=Math.max(peak[x.n]||0, Number(x.lp)||0);
        });
      });

      var names = Object.keys(series);
      var CAP = 80;
      if(names.length > CAP){ names.sort(function(a,b){ return peak[b]-peak[a]; }); names = names.slice(0, CAP); }
      contenders = names.map(function(n){ return { name:n, region:region[n]||"", pts:series[n] }; });

      startT = frames[0].t; endT = frames[frames.length-1].t; span = endT-startT;
      if(span <= 0) return false;

      stage.innerHTML = "";
      contenders.forEach(function(c){
        var hl = hlFor(c.name);
        var el = document.createElement("div");
        el.className = "rrow" + fxClass(hl);
        el.innerHTML =
          '<div class="rrank"></div>'+
          '<div class="rname pname">'+nameInner(c.name, hl)+liveBadge(hl)+'<span class="rregion">'+esc(c.region)+'</span></div>'+
          '<div class="rbar"><div class="rfill"></div></div>'+
          '<div class="rlp"></div>';
        el.style.opacity = "0";
        stage.appendChild(el);
      });
      contenders.forEach(function(c, i){
        var el = stage.children[i];
        rowEls[c.name] = { el:el, rank:el.querySelector(".rrank"), fill:el.querySelector(".rfill"), lp:el.querySelector(".rlp") };
      });
      stage.style.height = (laneCount * ROW_H) + "px";
      return true;
    }

    function renderFrame(prog){
      var t = startT + prog*span;
      var states = contenders.map(function(c){ var r=lpAt(c.pts,t); return { name:c.name, present:r.present, lp:r.lp }; });
      var present = states.filter(function(s){ return s.present; }).sort(function(a,b){ return b.lp-a.lp; });
      var rankByName = {};
      present.forEach(function(s, idx){ rankByName[s.name]=idx; });

      states.forEach(function(s){
        var ref = rowEls[s.name]; if(!ref) return;
        var idx = rankByName[s.name];
        if(!s.present || idx === undefined || idx >= laneCount){
          ref.el.style.opacity = "0";
          ref.el.style.transform = "translateY("+((idx>=laneCount)? (laneCount*ROW_H) : -10)+"px)";
          return;
        }
        ref.el.style.opacity = "1";
        ref.el.style.transform = "translateY("+(idx*ROW_H)+"px)";
        var pct = Math.max(0, Math.min(100, (s.lp/target)*100));
        ref.fill.style.width = pct.toFixed(2)+"%";
        ref.lp.textContent = Math.round(s.lp)+" LP";
        var pos = idx+1;
        ref.rank.className = "rrank" + (pos===1?" p1":pos===2?" p2":pos===3?" p3":"");
        ref.rank.textContent = pos;
        if(s.lp>=target) ref.el.classList.add("done"); else ref.el.classList.remove("done");
      });

      fillEl.style.width = (prog*100).toFixed(2)+"%";
      handle.style.left  = (prog*100).toFixed(2)+"%";
      var d = new Date(t);
      timeLbl.textContent = d.toLocaleDateString(undefined,{month:"short",day:"numeric"}) + " \u00b7 " +
                            d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
    }

    function clipDur(){ return BASE*mult; }
    function tick(ts){
      if(!playing) return;
      if(!lastTs) lastTs=ts;
      var dt=ts-lastTs; lastTs=ts;
      progress += dt/clipDur();
      if(progress>=1){ progress=1; renderFrame(1); endState(); return; }
      renderFrame(progress);
      rafId=requestAnimationFrame(tick);
    }
    function showUI(on){ restartBtn.hidden=!on; exitBtn.hidden=!on; track.hidden=!on; timeLbl.hidden=!on; }
    function enter(){ board.style.display="none"; boardHead.style.display="none"; if(scale) scale.style.display="none"; stage.style.display="block"; stage.setAttribute("aria-hidden","false"); showUI(true); }
    function exit(){ pauseOnly(); progress=0; stage.style.display="none"; stage.setAttribute("aria-hidden","true"); board.style.display=""; boardHead.style.display=""; if(scale) scale.style.display=""; showUI(false); setPlay("&#9654; Replay season"); }
    function play(){
      if(rafId) cancelAnimationFrame(rafId);
      if(progress>=1) progress=0;
      if(stage.style.display!=="block") enter();
      playing=true; lastTs=0; setPlay("&#10073;&#10073; Pause"); rafId=requestAnimationFrame(tick);
    }
    function pauseOnly(){ playing=false; if(rafId) cancelAnimationFrame(rafId); }
    function pause(){ pauseOnly(); setPlay("&#9654; Resume"); }
    function endState(){ pauseOnly(); setPlay("&#9654; Replay again"); }

    async function ensureReady(){
      if(ready) return true;
      if(building) return false;
      building = true;
      setPlay("&#8987; Loading\u2026"); playBtn.disabled = true;
      var hist = null;
      try{ var r = await fetch("data/history.json?_="+Date.now()); if(r.ok) hist = await r.json(); }
      catch(e){ /* ignore */ }
      building = false; playBtn.disabled = false;
      if(hist && buildFromHistory(hist)){ ready = true; setPlay("&#9654; Replay season"); return true; }
      setPlay("&#9654; Replay season");
      playBtn.disabled = true;
      playBtn.title = "Replay unlocks once enough history is recorded (needs a few snapshots over time).";
      return false;
    }

    playBtn.addEventListener("click", async function(){
      if(playBtn.disabled) return;
      if(playing){ pause(); return; }
      if(await ensureReady()) play();
    });
    restartBtn.addEventListener("click", function(){ if(!ready) return; progress=0; lastTs=0; play(); });
    exitBtn.addEventListener("click", exit);

    var sBtns = speeds.querySelectorAll(".rp-speed");
    for(var i=0;i<sBtns.length;i++){
      sBtns[i].addEventListener("click", function(){
        for(var j=0;j<sBtns.length;j++) sBtns[j].classList.remove("active");
        this.classList.add("active"); mult=parseFloat(this.getAttribute("data-mult"))||1; lastTs=0;
      });
    }

    var scrubbing=false, wasPlaying=false;
    function seekFromEvent(e){
      var rect=track.getBoundingClientRect(); if(!rect.width) return;
      var cx=(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX;
      progress=Math.max(0,Math.min(1,(cx-rect.left)/rect.width)); renderFrame(progress);
    }
    async function startScrub(e){
      if(track.hidden){ if(!(await ensureReady())) return; if(stage.style.display!=="block") enter(); }
      scrubbing=true; wasPlaying=playing; if(playing) pauseOnly();
      seekFromEvent(e); if(e.cancelable) e.preventDefault();
    }
    function moveScrub(e){ if(scrubbing) seekFromEvent(e); }
    function endScrub(){ if(!scrubbing) return; scrubbing=false; if(wasPlaying && progress<1) play(); else if(!wasPlaying && progress<1) setPlay("&#9654; Resume"); }
    track.addEventListener("mousedown", startScrub);
    window.addEventListener("mousemove", moveScrub);
    window.addEventListener("mouseup", endScrub);
    track.addEventListener("touchstart", startScrub, {passive:false});
    window.addEventListener("touchmove", moveScrub, {passive:false});
    window.addEventListener("touchend", endScrub);

    if(window.__RACE_DEBUG){
      window.__raceReplay = {
        buildFromHistory: buildFromHistory,
        renderFrame: function(p){ return renderFrame(p); },
        getState: function(){ return { contenders:contenders, rowEls:rowEls, startT:startT, endT:endT, span:span, laneCount:laneCount }; }
      };
    }
  }

  // ==================================================================
  // boot
  // ==================================================================
  (async function(){
    var live = null;
    try{ var r = await fetch("data/live.json?_="+Date.now()); if(r.ok) live = await r.json(); }
    catch(e){ /* not deployed yet / offline */ }
    renderLive(live);
    initReplay();
  })();
})();
</script>
</body>
</html>
